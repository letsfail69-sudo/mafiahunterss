<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Mafia Hunterss Translator</title>
</head>
<body>
  <h1>Mafia Hunterss Translator</h1>

  <p>API key:</p>
  <input id="apiKey" type="password" placeholder="Google Cloud API key" style="width:400px">

  <br><br>

  <button onclick="translateAll()">Přeložit</button>

  <h2>Výsledek</h2>
  <pre id="output"></pre>

  <script>
    const languages = {
      en: "English",
      de: "German",
      pl: "Polish",
      sk: "Slovak"
    };

    async function translateText(text, target, apiKey) {
      const response = await fetch(
        "https://translation.googleapis.com/language/translate/v2?key=" + apiKey,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            q: text,
            source: "cs",
            target: target,
            format: "text"
          })
        }
      );

      const data = await response.json();

      if (data.error) {
        throw new Error(data.error.message);
      }

      return data.data.translations[0].translatedText;
    }

    async function translateAll() {
      const apiKey = document.getElementById("apiKey").value.trim();
      const output = document.getElementById("output");

      if (!apiKey) {
        alert("Vlož API key.");
        return;
      }

      output.textContent = "Načítám cs.json...";

      const cs = await fetch("../lang/cs.json").then(r => r.json());

      for (const lang of Object.keys(languages)) {
        output.textContent = "Překládám do: " + languages[lang];

        const translated = {};

        for (const key of Object.keys(cs)) {
          translated[key] = await translateText(cs[key], lang, apiKey);
        }

        downloadJson(translated, lang + ".json");
      }

      output.textContent = "Hotovo. Soubory byly staženy.";
    }

    function downloadJson(data, filename) {
      const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: "application/json" }
      );

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }
  </script>
</body>
</html>
